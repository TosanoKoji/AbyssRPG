<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABYSS RITE — 奈落の儀式</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#1a1a1f;color:#e0ddd8;min-height:100vh}
#game{max-width:520px;margin:0 auto;padding:16px}
.screen{display:none}.screen.active{display:block}
.title{font-size:22px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:#888780;margin-bottom:20px}
.btn{background:transparent;border:0.5px solid #5f5e5a;border-radius:8px;padding:8px 18px;font-size:14px;color:#e0ddd8;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#2c2c2a}
.btn-primary{background:#2c2c2a;border-color:#888780}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:#1f1f24;border:0.5px solid #3a3a38;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s, background .15s, box-shadow .15s}
.card:hover:not(.locked){border-color:#888780}
.card.selected{background:#1f2922;border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.15)}
.card.locked{opacity:0.3;cursor:not-allowed}
.card.last-run-card { border-color: #534AB7; background: #1c1c2b; position: relative; overflow: hidden; }
.card.last-run-card::after { content: "RETRY"; position: absolute; top: 10px; right: -20px; background: #534AB7; color: white; font-size: 9px; padding: 2px 20px; transform: rotate(45deg); font-weight: bold; letter-spacing: 1px; }
.card-title{font-size:15px;font-weight:500;margin-bottom:3px}
.card-sub{font-size:12px;color:#888780}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row2{display:flex;gap:10px}
.stat-box{background:#2c2c2a;border-radius:8px;padding:8px 12px;text-align:center;flex:1}
.stat-label{font-size:11px;color:#5f5e5a;margin-bottom:2px}
.stat-val{font-size:18px;font-weight:500}
.hp-bar-wrap{background:#3a3a38;border-radius:4px;height:8px;margin:4px 0;overflow:hidden}
.hp-bar{height:100%;border-radius:4px;transition:width .4s}
.hp-hero{background:#A32D2D}.hp-enemy{background:#185FA5}
.mp-bar-wrap{background:#3a3a38;border-radius:4px;height:5px;margin:2px 0;overflow:hidden}
.mp-bar{height:100%;border-radius:4px;background:#534AB7;transition:width .4s}
.battle-area{background:#2c2c2a;border-radius:12px;padding:40px 16px 16px;margin:8px 0;min-height:210px;position:relative;overflow:hidden}
.fighter{display:inline-block;transition:transform .15s}
.fighter.attack{animation:atk .3s}
.fighter.attack-slash{animation:atk-slash .3s}
.fighter.attack-pierce{animation:atk-pierce .2s}
.fighter.attack-smash{animation:atk-smash .4s}
.fighter.attack-strike{animation:atk-strike .35s}
.fighter.enemy-attack{animation:enemy-atk .3s}
.fighter.skill-attack{animation:sklatk .5s}
.fighter.shake{animation:shk .3s}
@keyframes atk{0%{transform:translateX(0)}40%{transform:translateX(18px)}100%{transform:translateX(0)}}
@keyframes atk-slash{0%{transform:translateX(0) rotate(0deg)}40%{transform:translateX(18px) rotate(15deg)}100%{transform:translateX(0) rotate(0deg)}}
@keyframes atk-pierce{0%{transform:translateX(0)}40%{transform:translateX(24px)}100%{transform:translateX(0)}}
@keyframes atk-smash{0%{transform:translate(0,0) rotate(0deg)}30%{transform:translate(-5px,-15px) rotate(-10deg)}50%{transform:translate(20px,10px) rotate(20deg)}100%{transform:translate(0,0) rotate(0deg)}}
@keyframes atk-strike{0%{transform:translateX(0)}40%{transform:translateX(18px) scale(1.1)}100%{transform:translateX(0) scale(1)}}
@keyframes enemy-atk{0%{transform:translateX(0)}40%{transform:translateX(-18px)}100%{transform:translateX(0)}}
@keyframes sklatk{0%{transform:scale(1)}30%{transform:scale(1.4) translateX(12px)}70%{transform:scale(1.2) translateX(18px)}100%{transform:scale(1) translateX(0)}}
@keyframes shk{0%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}100%{transform:translateX(0)}}
.dmg-pop{position:absolute;font-size:22px;font-weight:700;color:#E24B4A;pointer-events:none;animation:pop .9s forwards;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.dmg-pop.skill-dmg{font-size:28px;color:#c084fc;text-shadow:0 0 12px #a855f7,0 2px 6px rgba(0,0,0,.5)}
.dmg-pop.crit-dmg{font-size:26px;color:#FCD34D;text-shadow:0 0 10px #F59E0B,0 2px 6px rgba(0,0,0,.5)}
.dmg-pop.heal{font-size:20px;color:#1D9E75;text-shadow:0 0 8px #10b981}
.dmg-pop.dodge-txt{color:#60A5FA;font-size:16px;font-weight:600}
.dmg-pop.enemy-dmg{color:#F09595}
@keyframes pop{0%{opacity:1;transform:translateY(0) scale(1)}20%{transform:translateY(-8px) scale(1.1)}100%{opacity:0;transform:translateY(-50px) scale(.8)}}
.skill-flash{position:absolute;inset:0;background:rgba(168,85,247,.18);border-radius:12px;animation:flash .4s forwards;pointer-events:none}
.crit-flash{position:absolute;inset:0;background:rgba(252,211,77,.12);border-radius:12px;animation:flash .3s forwards;pointer-events:none}
.hero-flash{position:absolute;inset:0;background:rgba(226,75,74,.10);border-radius:12px;animation:flash .25s forwards;pointer-events:none}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
.log{background:#1a1a1f;border:0.5px solid #2c2c2a;border-radius:8px;padding:8px 12px;font-size:12px;color:#888780;max-height:200px;overflow-y:auto;margin:6px 0}
.log p{margin:2px 0;padding:1px 0;border-bottom:0.5px solid #22222a}
.log p:first-child{border-bottom:none}
.log .log-crit{color:#FCD34D;font-weight:600}
.log .log-dodge{color:#60A5FA}
.log .log-skill{color:#c084fc}
.log .log-hero-dmg{color:#F09595}
.log .log-enemy-dmg{color:#85B7EB}
.log .log-heal{color:#6ee7b7}
.log .log-system{color:#5f5e5a;font-style:italic}
.passive-tooltip{position:fixed;background:#1a1a1f;border:0.5px solid #534AB7;border-radius:8px;padding:7px 11px;font-size:11px;color:#c4c2bc;pointer-events:none;z-index:999;max-width:180px;line-height:1.5;display:none}
.passive-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:8px;margin-right:4px;margin-bottom:3px;cursor:default;transition:box-shadow .3s,border-color .3s;position:relative}
.passive-badge.always{background:#0a2e1a;color:#6ee7b7;border:0.5px solid #1a5c38;animation:passiveGlow 2.5s ease-in-out infinite}
.passive-badge.conditional{background:#1a1a2e;color:#AFA9EC;border:0.5px solid #3a3a38}
.passive-badge.triggered{background:#26215C;color:#c084fc;border:0.5px solid #7c3aed;animation:passivePop .5s ease-out,passiveGlowStrong 1.5s ease-in-out}
@keyframes passiveGlow{0%,100%{box-shadow:0 0 4px rgba(110,231,183,.15)}50%{box-shadow:0 0 8px rgba(110,231,183,.35)}}
@keyframes passiveGlowStrong{0%{box-shadow:0 0 0 rgba(192,132,252,0)}20%{box-shadow:0 0 14px rgba(192,132,252,.7)}100%{box-shadow:0 0 6px rgba(192,132,252,.25)}}
@keyframes passivePop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:8px;margin-right:4px}
.badge-red{background:#501313;color:#F09595}
.badge-blue{background:#042C53;color:#85B7EB}
.badge-purple{background:#26215C;color:#AFA9EC}
.badge-amber{background:#412402;color:#EF9F27}
.badge-gray{background:#2C2C2A;color:#B4B2A9}
.badge-green{background:#0a2e1a;color:#6ee7b7}
.badge-teal{background:#0a2828;color:#5eead4}
.badge-gold{background:#3a2800;color:#FCD34D}
.badge-orange{background:#2c1800;color:#fb923c}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.skill-card{background:#2c2c2a;border:0.5px solid #3a3a38;border-radius:8px;padding:10px;cursor:pointer;transition:border-color .15s, background .15s, box-shadow .15s}
.skill-card:hover:not(.locked){border-color:#888780}
.skill-card.selected{background:#1f2922;border-color:#4ade80;box-shadow:0 0 8px rgba(74,222,128,0.15)}
.skill-card.locked{opacity:0.3;cursor:not-allowed}
.skill-name{font-size:13px;font-weight:500;margin-bottom:2px}
.skill-desc{font-size:11px;color:#888780}
.tab-bar{display:flex;margin-bottom:12px;border:0.5px solid #3a3a38;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:8px;font-size:13px;text-align:center;cursor:pointer;background:#1f1f24;color:#888780;border:none;font-family:inherit;transition:background .15s}
.tab.active{background:#2c2c2a;color:#e0ddd8}
.active-btn{background:#26215C;border:0.5px solid #534AB7;border-radius:8px;padding:7px 12px;font-size:12px;color:#AFA9EC;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:76px}
.active-btn:hover:not(:disabled){background:#2d2865;border-color:#7c6fe0}
.active-btn:disabled{opacity:.4;cursor:not-allowed}
.active-btn .sk-name{font-size:12px;font-weight:500}
.active-btn .sk-cost{font-size:10px;color:#8b7cf8}
.room-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:12px 0}
.room{background:#2c2c2a;border:0.5px solid #3a3a38;border-radius:6px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:#5f5e5a}
.room.cleared{color:#888780}.room.current{border:1.5px solid #534AB7;color:#AFA9EC}
.room.locked{opacity:.35}.room.boss{border-color:#A32D2D;color:#F09595}
.divider{border:none;border-top:0.5px solid #3a3a38;margin:14px 0}
.souls{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#888780}
.soul-icon{width:10px;height:10px;border-radius:50%;background:#534AB7;display:inline-block}
.choice-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.mp-display{font-size:11px;color:#8b7cf8;margin-top:2px}
.battle-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:#1f1f24;border:0.5px solid #3a3a38;border-radius:8px;padding:6px 8px;margin:4px 0}
.bs-item{text-align:center}
.bs-label{font-size:9px;color:#5f5e5a}
.bs-val{font-size:12px;font-weight:500;color:#b4b2a9}
.lv-stat-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid #3a3a38}
.lv-stat-name{font-size:13px;width:80px}
.lv-stat-cur{font-size:13px;color:#AFA9EC;width:60px;text-align:right}
.lv-stat-btn{background:#26215C;border:0.5px solid #534AB7;border-radius:6px;padding:3px 12px;font-size:13px;color:#AFA9EC;cursor:pointer;font-family:inherit}
.lv-stat-btn:disabled{opacity:.3;cursor:not-allowed}
.lv-stat-cost{font-size:11px;color:#888780;margin-left:4px}
.exp-bar-wrap{background:#3a3a38;border-radius:4px;height:6px;margin:6px 0;overflow:hidden}
.exp-bar{height:100%;border-radius:4px;background:#534AB7;transition:width .4s}
.skill-tooltip{position:fixed;background:#1a1a1f;border:0.5px solid #534AB7;border-radius:8px;padding:8px 12px;font-size:11px;color:#c4c2bc;pointer-events:none;z-index:999;max-width:200px;line-height:1.6;display:none}
.skill-tooltip .st-name{font-size:12px;font-weight:500;color:#AFA9EC;margin-bottom:3px}
.skill-tooltip .st-cost{font-size:10px;color:#8b7cf8;margin-bottom:2px}
.floor-card{background:#1f1f24;border:0.5px solid #3a3a38;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s}
.floor-card:hover:not(.locked-floor){border-color:#888780;background:#252528}
.floor-card.locked-floor{opacity:.45;cursor:not-allowed}
.floor-card.active-floor{border-color:#534AB7;background:#1e1c2e}
.floor-name{font-size:16px;font-weight:500;margin-bottom:3px}
.floor-desc{font-size:12px;color:#888780;margin-bottom:6px}
.btn-danger{border-color:#A32D2D;color:#F09595}
.btn-danger:hover{background:#2c1010}
.title-hero{text-align:center;padding:28px 0 16px;position:relative}
.title-logo{font-size:32px;font-weight:500;letter-spacing:3px;margin-bottom:4px;background:linear-gradient(135deg,#e0ddd8 40%,#AFA9EC 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title-sub-text{font-size:12px;color:#5f5e5a;letter-spacing:1px;margin-bottom:20px}
.title-stats-bar{display:flex;justify-content:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.title-stat-item{text-align:center;background:#1f1f24;border:0.5px solid #3a3a38;border-radius:10px;padding:8px 16px;min-width:90px}
.title-stat-label{font-size:10px;color:#5f5e5a;margin-bottom:2px}
.title-stat-val{font-size:18px;font-weight:500;color:#e0ddd8}
.title-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:320px;margin:0 auto 12px}
.title-btn-explore{grid-column:1/-1;background:#26215C;border:0.5px solid #534AB7;border-radius:12px;padding:14px;font-size:16px;font-weight:500;color:#AFA9EC;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:1px}
.title-btn-explore:hover{background:#2d2865;border-color:#7c6fe0;color:#c084fc}
.title-btn-sub{background:#1f1f24;border:0.5px solid #3a3a38;border-radius:10px;padding:10px;font-size:13px;color:#888780;cursor:pointer;font-family:inherit;transition:background .15s}
.title-btn-sub:hover{background:#2c2c2a;color:#e0ddd8}
.ach-notify{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1f;border:1px solid #FCD34D;border-radius:12px;padding:12px 18px;font-size:13px;color:#FCD34D;z-index:9999;box-shadow:0 0 20px rgba(252,211,77,.3);animation:achPop .4s ease-out;max-width:300px;text-align:center;pointer-events:none}
@keyframes achPop{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.ach-card{background:#1f1f24;border:0.5px solid #3a3a38;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ach-card.done{border-color:#1a5c38;background:#0a1f14}
.ach-card.new-unlock{border-color:#FCD34D;background:#1a1500;animation:achGlow 2s ease-in-out infinite}
@keyframes achGlow{0%,100%{box-shadow:0 0 6px rgba(252,211,77,.2)}50%{box-shadow:0 0 14px rgba(252,211,77,.5)}}
.ach-title-text{font-size:14px;font-weight:500;margin-bottom:2px}
.ach-cond{font-size:11px;color:#888780}
.ach-prog{font-size:11px;color:#AFA9EC;margin-top:3px}
.ach-prog-bar{background:#3a3a38;border-radius:3px;height:4px;margin-top:4px;overflow:hidden}
.ach-prog-fill{height:100%;border-radius:3px;background:#534AB7;transition:width .4s}
/* ハードリセット確認モーダル */
#reset-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:10000;display:none;align-items:center;justify-content:center;padding:16px;}
.rm-content{background:#1a1a1f;border:1px solid #A32D2D;border-radius:12px;padding:20px;max-width:320px;width:100%;text-align:center;}
</style>
</head>
<body>
<div id="game">

<!-- タイトル -->
<div id="s-title" class="screen active">
  <div class="title-hero">
    <div class="title-logo">ABYSS RITE</div>
    <div class="title-sub-text">奈落の儀式 — ダークファンタジー ローグライト</div>
    <div class="title-stats-bar">
      <div class="title-stat-item">
        <div class="title-stat-label">💠 魂の欠片</div>
        <div class="title-stat-val" id="soul-count">0</div>
      </div>
      <div class="title-stat-item">
        <div class="title-stat-label">✦ 経験値</div>
        <div class="title-stat-val" id="exp-count" style="color:#AFA9EC">0</div>
      </div>
      <div class="title-stat-item">
        <div class="title-stat-label">⚡ 総レベル</div>
        <div class="title-stat-val" id="totallv-title">0</div>
      </div>
    </div>
    <div id="title-ach-bar" style="display:none;margin-bottom:14px">
      <div style="background:#1a1500;border:0.5px solid #FCD34D;border-radius:10px;padding:8px 14px;font-size:12px;color:#FCD34D;cursor:pointer" onclick="goTo('s-achieve')">
        🏆 <span id="title-ach-msg">達成報酬が解放されました！</span>
      </div>
    </div>
    <div class="title-btn-grid">
      <button class="title-btn-explore" onclick="goTo('s-floor')">⚔ 探索する</button>
      <button class="title-btn-sub" onclick="goTo('s-unlock')">🔓 アンロック</button>
      <button class="title-btn-sub" onclick="goTo('s-level')">⬆ キャラ強化</button>
      <button class="title-btn-sub" onclick="goTo('s-achieve')">🏆 達成報酬</button>
    </div>
  </div>
  <div style="text-align:center; margin-top:24px;">
    <span style="font-size:10px; color:#4a4a4a; cursor:pointer; text-decoration:underline;" onclick="openResetModal()">全ての状態をリセット</span>
  </div>
</div>

<!-- 階層選択 -->
<div id="s-floor" class="screen">
  <div class="title">階層選択</div>
  <div class="sub">どの深さへ潜る？</div>
  <div id="floor-list"></div>
  <hr class="divider">
  <button class="btn" onclick="goTo('s-title')">戻る</button>
</div>

<!-- アンロック -->
<div id="s-unlock" class="screen">
  <div class="title">アンロックショップ</div>
  <div class="sub">魂の欠片を消費して力を解放する</div>
  <div class="tab-bar">
    <button class="tab active" id="utab-chars" onclick="switchUnlockTab('chars')">キャラ</button>
    <button class="tab" id="utab-weapons" onclick="switchUnlockTab('weapons')">武器</button>
    <button class="tab" id="utab-armors" onclick="switchUnlockTab('armors')">防具</button>
    <button class="tab" id="utab-skills" onclick="switchUnlockTab('skills')">スキル</button>
  </div>
  <div style="font-size:12px;color:#888780;margin-bottom:8px">所持: <strong id="unlock-souls-disp">0</strong> ／ 総Lv: <strong id="totallv-unlock">0</strong></div>
  <div id="unlock-list"></div>
  <hr class="divider">
  <button class="btn" onclick="goTo('s-title')">戻る</button>
</div>

<!-- キャラ強化 -->
<div id="s-level" class="screen">
  <div class="title">キャラクター強化</div>
  <div style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:13px;color:#888780">経験値: <strong id="lv-exp-disp" style="color:#AFA9EC">0</strong></span>
      <span style="font-size:13px;color:#888780">総レベル: <strong id="totallv-level">0</strong></span>
    </div>
    <div class="exp-bar-wrap"><div class="exp-bar" id="lv-exp-bar" style="width:0%"></div></div>
    <div style="font-size:11px;color:#5f5e5a" id="lv-next-exp"></div>
  </div>
  <div id="lv-stat-list"></div>
  <hr class="divider">
  <button class="btn" onclick="goTo('s-title')">戻る</button>
</div>

<!-- 達成報酬 -->
<div id="s-achieve" class="screen">
  <div class="title">達成報酬</div>
  <div id="achieve-list"></div>
  <hr class="divider">
  <button class="btn" onclick="goTo('s-title')">戻る</button>
</div>

<!-- キャラ選択 -->
<div id="s-char" class="screen">
  <div class="title">キャラクター選択</div>
  <div id="last-run-container"></div>
  <div id="char-list"></div>
  <hr class="divider">
  <button class="btn btn-primary" id="btn-to-equip" onclick="goTo('s-equip')" disabled>装備を選ぶ</button>
  <button class="btn" onclick="goTo('s-title')" style="margin-left:8px">戻る</button>
</div>

<!-- 装備選択 -->
<div id="s-equip" class="screen">
  <div class="title">装備選択</div>
  <div style="font-size:13px;font-weight:500;margin:10px 0 6px">武器</div>
  <div id="weapon-list"></div>
  <div style="font-size:13px;font-weight:500;margin:10px 0 6px">防具</div>
  <div id="armor-list"></div>
  <div style="font-size:13px;font-weight:500;margin:10px 0 6px">💍 装飾品 <span id="acc-slots-label"></span></div>
  <div id="accessory-list"></div>
  <hr class="divider">
  <button class="btn btn-primary" id="btn-to-skill" onclick="goTo('s-skill')" disabled>スキル設定</button>

</div>

<!-- スキル設定 -->
<div id="s-skill" class="screen">
  <div class="title">スキル設定</div>
  <div id="skill-screen-sub" class="sub"></div>
  <div class="tab-bar">
    <button class="tab active" id="tab-active" onclick="switchSkillTab('active')">⚡ アクティブ</button>
    <button class="tab" id="tab-passive" onclick="switchSkillTab('passive')">🛡 パッシブ</button>
  </div>
  <div id="skill-tab-active">
    <div class="skill-grid" id="active-skill-list"></div>
    <div style="font-size:12px;color:#888780">選択中: <span id="active-skill-count">0</span>/<span id="active-skill-max">3</span></div>
  </div>
  <div id="skill-tab-passive" style="display:none">
    <div class="skill-grid" id="passive-skill-list"></div>

  </div>
  <hr class="divider">
  <button class="btn btn-primary" onclick="startRun()">ダンジョンへ</button>
  <button class="btn" onclick="goTo('s-equip')" style="margin-left:8px">戻る</button>
</div>

<!-- ダンジョン -->
<div id="s-dungeon" class="screen">
  <div class="row" style="margin-bottom:12px;justify-content:space-between">
    <div>
      <span style="font-size:15px;font-weight:500">奈落の迷宮</span>
      <span style="font-size:12px;color:#888780;margin-left:8px">部屋 <span id="room-num">1</span>/10</span>
    </div>
    <div class="souls"><span class="soul-icon"></span><span id="run-souls">0</span></div>
  </div>
  <div class="room-grid" id="room-grid"></div>
  <div style="background:#1f1f24;border:0.5px solid #3a3a38;border-radius:10px;padding:10px 12px;margin:8px 0">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px" id="dungeon-stats"></div>
  </div>
  <div id="d-accessory-info" style="display:none;background:#1f1f24;border:0.5px solid #3a3a38;border-radius:8px;padding:8px 12px;margin:6px 0;font-size:12px;color:#888780"></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="enterRoom()">部屋に入る</button>
    <button class="btn" onclick="showRetreatConfirm()">引き返す</button>
  </div>
</div>

<!-- 戦闘 -->
<div id="s-battle" class="screen">
  <div class="row" style="justify-content:space-between;margin-bottom:8px">
    <div id="battle-title" style="font-size:14px;font-weight:500"></div>
    <div class="souls"><span class="soul-icon"></span><span id="b-souls">0</span></div>

  <div class="battle-area" id="battle-area">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;height:100%">
      <div style="text-align:center;width:130px">
        <div id="hero-sprite" style="font-size:44px;margin-bottom:6px;display:inline-block" class="fighter"></div>
        <div id="b-hero-name" style="font-size:12px;font-weight:500"></div>
        <div class="hp-bar-wrap"><div class="hp-bar hp-hero" id="b-hero-hp"></div></div>
        <div id="b-hero-hp-text" style="font-size:11px;color:#F09595;font-weight:500"></div>
        <div class="mp-bar-wrap"><div class="mp-bar" id="b-hero-mp"></div></div>
        <div id="b-hero-mp-text" class="mp-display"></div>
      </div>
      <div style="font-size:18px;color:#5f5e5a">VS</div>
      <div style="text-align:center;width:130px">
        <div id="enemy-sprite" style="font-size:44px;margin-bottom:6px;display:inline-block" class="fighter"></div>
        <div id="b-enemy-name" style="font-size:12px;font-weight:500"></div>
        <div class="hp-bar-wrap"><div class="hp-bar hp-enemy" id="b-enemy-hp"></div></div>
        <div id="b-enemy-hp-text" style="font-size:11px;color:#85B7EB;font-weight:500"></div>

    </div>
  </div>

  </div>
  <div class="log" id="battle-log"></div>
  <div id="battle-result" style="display:none;margin-top:10px"></div>
</div>

<!-- 選択肢 -->
<div id="s-choice" class="screen">
  <div class="title">選択</div>

  <div class="choice-list" id="choice-list"></div>
</div>

<!-- 結果 -->
<div id="s-result" class="screen">
  <div style="text-align:center;padding:24px 0 16px">
    <div style="font-size:32px;margin-bottom:10px" id="result-icon"></div>
    <div class="title" id="result-title"></div>
    <div class="sub" id="result-sub"></div>
    <div class="row2" style="justify-content:center;margin:16px 0">
      <div class="stat-box"><div class="stat-label">撃破</div><div class="stat-val" id="r-kills">0</div></div>
      <div class="stat-box"><div class="stat-label">魂</div><div class="stat-val" id="r-souls">0</div></div>
      <div class="stat-box"><div class="stat-label">EXP</div><div class="stat-val" id="r-exp">0</div></div>
    </div>
    <div id="result-ach" style="display:none;margin-bottom:12px"></div>
    <button class="btn btn-primary" onclick="goTo('s-title')">タイトルへ</button>
  </div>

</div>

<!-- ツールチップ系 -->
<div class="passive-tooltip" id="passive-tooltip"></div>
<div class="skill-tooltip" id="skill-tooltip"><div class="st-name" id="st-name"></div><div class="st-cost" id="st-cost"></div><div id="st-desc"></div></div>

<!-- モーダル -->
<div id="reset-modal">
  <div class="rm-content">
    <h3 style="color:#F09595;margin-bottom:10px;">⚠️ データの初期化</h3>
    <p style="font-size:13px;color:#e0ddd8;margin-bottom:16px;">全ての進行状況を削除しますか？</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn" onclick="closeResetModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="executeHardReset()">初期化する</button>
    </div>
  </div>
</div>

<script>
// ═══ グローバル変数 ════════════════════════════════════════
let MASTER = {};
const GS = {
  souls: parseInt(localStorage.getItem('abyss_souls')||'0'),
  exp: parseInt(localStorage.getItem('abyss_exp')||'0'),
  totalLv: parseInt(localStorage.getItem('abyss_totallv')||'0'),
  clearedFloors: JSON.parse(localStorage.getItem('abyss_cleared')||'[]'),
  unlocked: JSON.parse(localStorage.getItem('abyss_unlocked')||'["warrior","sword","leather","slash","lifedrain","arcane","ironwall","vampiric","mprecover","amulet_mp","ring_double","charm_souls"]'),
  lvBonus: JSON.parse(localStorage.getItem('abyss_lvbonus')||'{"hp":0,"atk":0,"def":0,"mp":0,"crit":0,"dodge":0}'),
  achStats: JSON.parse(localStorage.getItem('abyss_achstats')||'{"totalRun":0,"bossKills":{},"floorClears":{},"skillUses":{},"dodgeCount":0,"dodgeByChar":{},"killCount":0}'),
  achDone: JSON.parse(localStorage.getItem('abyss_achdone')||'[]'),
  unlockedUniqueSkills: JSON.parse(localStorage.getItem('abyss_unique')||'[]'),
  lastRun: JSON.parse(localStorage.getItem('abyss_last_run')||'null'),
  run: {}
};

// レベル強化定数
const LV_STATS=[
  {key:'hp', label:'最大HP', costPer:20, valPer:10, unit:'HP'},
  {key:'atk', label:'攻撃力', costPer:30, valPer:2, unit:'ATK'},
  {key:'def', label:'防御力', costPer:30, valPer:1, unit:'DEF'},
  {key:'mp', label:'最大MP', costPer:20, valPer:8, unit:'MP'},
  {key:'crit', label:'会心率', costPer:40, valPer:1, unit:'%', cap:30},
  {key:'dodge', label:'回避率', costPer:40, valPer:1, unit:'%', cap:30},
];

let bState={};
let paused=false;

// ═══ システムコア ══════════════════════════════════════════
async function init() {
  try {
    const res = await fetch('data.json');
    MASTER = await res.json();
    renderTitle();
  } catch (e) {
    alert("data.jsonが見つからないか、エラーがあります。同じフォルダにあるか確認してください。");
  }
}

function save(){
  localStorage.setItem('abyss_souls', GS.souls);
  localStorage.setItem('abyss_exp', GS.exp);
  localStorage.setItem('abyss_totallv', GS.totalLv);
  localStorage.setItem('abyss_cleared', JSON.stringify(GS.clearedFloors));
  localStorage.setItem('abyss_unlocked', JSON.stringify(GS.unlocked));
  localStorage.setItem('abyss_lvbonus', JSON.stringify(GS.lvBonus));
  localStorage.setItem('abyss_achstats', JSON.stringify(GS.achStats));
  localStorage.setItem('abyss_achdone', JSON.stringify(GS.achDone));
  localStorage.setItem('abyss_unique', JSON.stringify(GS.unlockedUniqueSkills));
  localStorage.setItem('abyss_last_run', JSON.stringify(GS.lastRun));
}

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-title') renderTitle();
  if(id==='s-floor') renderFloors();
  if(id==='s-unlock') renderUnlock();
  if(id==='s-level') renderLevel();
  if(id==='s-achieve') renderAchievements();
  if(id==='s-char') renderChars();
  if(id==='s-equip') renderEquip();
  if(id==='s-skill') renderSkills();
}

function renderTitle(){
  document.getElementById('soul-count').textContent=GS.souls;
  document.getElementById('exp-count').textContent=GS.exp;
  document.getElementById('totallv-title').textContent=GS.totalLv;
  const newAch=MASTER.achievements.filter(a=>!GS.achDone.includes(a.id)&&getAchProgress(a)>=a.condVal);
  const bar=document.getElementById('title-ach-bar');
  if(newAch.length){bar.style.display='block';document.getElementById('title-ach-msg').textContent=`報酬が${newAch.length}件あります！`;}
  else bar.style.display='none';
}

// ═══ 階層・ショップ ════════════════════════════════════════
function renderFloors(){
  const el=document.getElementById('floor-list'); el.innerHTML='';
  MASTER.floors.forEach(f=>{
    const locked=f.unlockReq && !GS.clearedFloors.includes(f.unlockReq.clearedFloor);
    const active=GS.run.floorId===f.id;
    el.innerHTML+=`
      <div class="floor-card ${locked?'locked-floor':''} ${active?'active-floor':''}" onclick="${locked?'':`selectFloor(${f.id})`}">
        <div class="floor-name">${f.icon} <span style="color:${f.color}">${f.name}</span></div>
        <div class="floor-desc">${f.sub}</div>
        <div class="row">
          <span class="badge badge-amber">魂x${f.soulsMult}</span>
          <span class="badge badge-purple">EXPx${f.expMult}</span>
          ${locked?`<span class="badge badge-red">🔒地下${f.unlockReq.clearedFloor}階踏破で解放</span>`:''}
        </div>
      </div>`;
  });
  el.innerHTML+=`<button class="btn btn-primary" onclick="goTo('s-char')" style="margin-top:10px">探索開始</button>`;
}
function selectFloor(id){ GS.run.floorId=id; renderFloors(); }

let unlockTab='chars';
function switchUnlockTab(tab){
  unlockTab=tab;
  document.querySelectorAll('#s-unlock .tab').forEach(t=>t.classList.toggle('active', t.id===`utab-${tab}`));
  renderUnlock();
}
function renderUnlock(){
  document.getElementById('unlock-souls-disp').textContent=GS.souls;
  document.getElementById('totallv-unlock').textContent=GS.totalLv;
  const list=document.getElementById('unlock-list'); list.innerHTML='';
  const items = MASTER[unlockTab] || (unlockTab==='skills' ? {...MASTER.activeSkills, ...MASTER.passiveSkills} : {});
  Object.values(items).forEach(item=>{
    if(item.unlockCond==='default') return;
    const done=GS.unlocked.includes(item.id);
    const lvOk=!item.lvReq || GS.totalLv >= item.lvReq;
    const locked=!lvOk && !done;
    list.innerHTML+=`<div class="card ${locked?'locked':''}" onclick="${done||locked?'':`buyItem('${item.id}',${item.unlockCost})`}" style="${done?'opacity:0.5':''}">
      <div class="row" style="justify-content:space-between">
        <div>
          <div class="card-title">${item.icon||''} ${item.name||''}</div>
          <div class="card-sub">${item.desc||''}</div>
        </div>
        <div>${done?'<span class="badge badge-gray">解放済</span>':locked?'<span class="badge badge-red">要Lv'+item.lvReq+'</span>':`<span class="badge badge-purple">${item.unlockCost} 欠片</span>`}</div>
      </div></div>`;
  });
}
function buyItem(id, cost){
  if(GS.souls<cost) return; GS.souls-=cost; GS.unlocked.push(id); save(); renderUnlock();
}

// ═══ 強化・達成報酬 ════════════════════════════════════════
function renderLevel(){
  const lv=calcLevel();
  document.getElementById('lv-exp-disp').textContent=GS.exp;
  document.getElementById('totallv-level').textContent=GS.totalLv;
  const list=document.getElementById('lv-stat-list'); list.innerHTML='';
  LV_STATS.forEach(s=>{
    const cur=GS.lvBonus[s.key]||0;
    const bonus=cur*s.valPer;
    list.innerHTML+=`<div class="lv-stat-row">
      <div class="lv-stat-name">${s.label}</div>
      <div class="lv-stat-cur">+${bonus}${s.unit}</div>
      <button class="lv-stat-btn" ${GS.exp>=s.costPer?'':'disabled'} onclick="lvUp('${s.key}',${s.costPer})">強化</button>
      <span class="lv-stat-cost">${s.costPer} EXP</span>
    </div>`;
  });
}
function calcLevel(){ return Math.floor(Object.values(GS.lvBonus).reduce((a,b)=>a+b,0)/3)+1; }
function lvUp(key, cost){
  if(GS.exp<cost) return; GS.exp-=cost; GS.lvBonus[key]++; GS.totalLv++; save(); renderLevel();
}

function getAchProgress(a){
  const st=GS.achStats;
  if(a.condType==='floorClear') return (st.floorClears||{})[a.charId]||0;
  if(a.condType==='bossKill') return (st.bossKills||{})[a.charId]||0;
  if(a.condType==='skillUse') return (st.skillUses||{})[a.charId]||0;
  if(a.condType==='totalRun') return st.totalRun||0;
  if(a.condType==='killCount') return st.killCount||0;
  if(a.condType==='dodgeCount') return (st.dodgeByChar||{})[a.charId]||0;
  return 0;
}
function renderAchievements(){
  const list=document.getElementById('achieve-list'); list.innerHTML='';
  MASTER.achievements.forEach(a=>{
    const done=GS.achDone.includes(a.id);
    const prog=getAchProgress(a);
    const pct=Math.min(100, Math.floor(prog/a.condVal*100));
    list.innerHTML+=`<div class="ach-card ${done?'done':''}">
      <div class="ach-title-text">${a.title} ${done?'✓':''}</div>
      <div class="ach-cond">${a.condDesc}</div>
      <div class="ach-prog">${prog} / ${a.condVal}</div>
      ${!done?`<div class="ach-prog-bar"><div class="ach-prog-fill" style="width:${pct}%"></div></div>`:''}
    </div>`;
  });
}

// ═══ 探索準備 ════════════════════════════════════════════
function renderChars(){
  const list=document.getElementById('char-list'); list.innerHTML='';
  Object.values(MASTER.chars).forEach(c=>{
    const ok=GS.unlocked.includes(c.id);
    list.innerHTML+=`<div class="card ${GS.run.charId===c.id?'selected':''} ${ok?'':'locked'}" onclick="${ok?`selectChar('${c.id}')`:''}">
      <div class="row">
        <div style="font-size:28px">${c.icon}</div>
        <div style="flex:1">
          <div class="card-title">${c.name}</div>
          <div class="card-sub">${c.desc}</div>
        </div>
      </div></div>`;
  });
}
function selectChar(id){ GS.run.charId=id; document.getElementById('btn-to-equip').disabled=false; renderChars(); }

function renderEquip(){
  const char=MASTER.chars[GS.run.charId];
  document.getElementById('acc-slots-label').textContent=`(${char.accessorySlots}枠)`;
  const wl=document.getElementById('weapon-list'); wl.innerHTML='';
  Object.values(MASTER.weapons).forEach(w=>{
    const ok=GS.unlocked.includes(w.id);
    wl.innerHTML+=`<div class="card ${GS.run.weaponId===w.id?'selected':''} ${ok?'':'locked'}" onclick="${ok?`GS.run.weaponId='${w.id}';renderEquip();`:''}">
      ${w.icon} ${w.name} (+${w.atk} ATK)
    </div>`;
  });
  const al=document.getElementById('armor-list'); al.innerHTML='';
  Object.values(MASTER.armors).forEach(a=>{
    const ok=GS.unlocked.includes(a.id);
    al.innerHTML+=`<div class="card ${GS.run.armorId===a.id?'selected':''} ${ok?'':'locked'}" onclick="${ok?`GS.run.armorId='${a.id}';renderEquip();`:''}">
      ${a.icon} ${a.name} (+${a.def} DEF)
    </div>`;
  });
  const acl=document.getElementById('accessory-list'); acl.innerHTML='';
  Object.values(MASTER.accessories).forEach(acc=>{
    const ok=GS.unlocked.includes(acc.id);
    const sel=(GS.run.accessories||[]).includes(acc.id);
    acl.innerHTML+=`<div class="card ${sel?'selected':''} ${ok?'':'locked'}" onclick="${ok?`toggleAcc('${acc.id}',${char.accessorySlots})`:''}">
      ${acc.icon} ${acc.name}
    </div>`;
  });
  document.getElementById('btn-to-skill').disabled=!(GS.run.weaponId && GS.run.armorId);
}
function toggleAcc(id, max){
  GS.run.accessories=GS.run.accessories||[];
  const idx=GS.run.accessories.indexOf(id);
  if(idx>=0) GS.run.accessories.splice(idx,1);
  else if(GS.run.accessories.length<max) GS.run.accessories.push(id);
  renderEquip();
}

function renderSkills(){
  const char=MASTER.chars[GS.run.charId];
  document.getElementById('active-skill-max').textContent=char.activeSlots;
  const list=document.getElementById('active-skill-list'); list.innerHTML='';
  Object.values(MASTER.activeSkills).forEach(s=>{
    const ok=GS.unlocked.includes(s.id);
    const sel=(GS.run.activeSkills||[]).includes(s.id);
    list.innerHTML+=`<div class="skill-card ${sel?'selected':''} ${ok?'':'locked'}" onclick="${ok?`toggleSkill('${s.id}',${char.activeSlots})`:''}">
      ${s.icon} ${s.name} (MP:${s.mpCost})
    </div>`;
  });
}
function toggleSkill(id, max){
  GS.run.activeSkills=GS.run.activeSkills||[];
  const idx=GS.run.activeSkills.indexOf(id);
  if(idx>=0) GS.run.activeSkills.splice(idx,1);
  else if(GS.run.activeSkills.length<max) GS.run.activeSkills.push(id);
  renderSkills();
}

// ═══ ダンジョン・戦闘コア ════════════════════════════════════
function startRun(){
  const c=MASTER.chars[GS.run.charId], w=MASTER.weapons[GS.run.weaponId], a=MASTER.armors[GS.run.armorId];
  const lb=GS.lvBonus;
  GS.run.maxHp = c.hp + a.hp + (lb.hp||0)*10;
  GS.run.hp = GS.run.maxHp;
  GS.run.atk = c.atk + w.atk + (lb.atk||0)*2;
  GS.run.def = c.def + a.def + (lb.def||0)*1;
  GS.run.maxMp = c.mp + (w.mp||0) + (a.mp||0) + (lb.mp||0)*8;
  GS.run.mp = GS.run.maxMp;
  GS.run.crit = c.crit + (lb.crit||0);
  GS.run.dodge = c.dodge + (lb.dodge||0);
  GS.run.hdodge = c.hdodge + (lb.dodge||0)*1.5;
  GS.run.room=0; GS.run.kills=0; GS.run.runSouls=0; GS.run.runExp=0;
  GS.run.roomTypes=['battle','battle','battle','treasure','battle','rest','battle','battle','battle','boss'];
  renderDungeon(); goTo('s-dungeon');
}

function renderDungeon(){
  document.getElementById('room-num').textContent=GS.run.room+1;
  document.getElementById('run-souls').textContent=GS.run.runSouls;
  const stats=document.getElementById('dungeon-stats');
  stats.innerHTML=`<div class="stat-box">HP ${GS.run.hp}</div><div class="stat-box">MP ${GS.run.mp}</div><div class="stat-box">ATK ${GS.run.atk}</div>`;
  const grid=document.getElementById('room-grid'); grid.innerHTML='';
  for(let i=0;i<10;i++){
    const type=GS.run.roomTypes[i];
    grid.innerHTML+=`<div class="room ${i<GS.run.room?'cleared':i===GS.run.room?'current':''} ${type==='boss'?'boss':''}">
      ${i<GS.run.room?'✓':i===GS.run.room?'●':type==='boss'?'B':'?'}
    </div>`;
  }
}

function enterRoom(){
  const type=GS.run.roomTypes[GS.run.room];
  const floor=MASTER.floors.find(f=>f.id===(GS.run.floorId||1));
  if(type==='battle'||type==='boss'){
    const pool=type==='boss'?floor.bosses:floor.enemies;
    startBattle(pool[Math.floor(Math.random()*pool.length)], type==='boss');
  } else { showChoice(type); }
}

function startBattle(enemy, isBoss){
  bState={
    heroHp:GS.run.hp, heroMaxHp:GS.run.maxHp,
    heroMp:GS.run.mp, heroMaxMp:GS.run.maxMp,
    enemyHp:enemy.hp, enemyMaxHp:enemy.hp,
    enemy, isBoss, over:false
  };
  document.getElementById('hero-sprite').textContent=MASTER.chars[GS.run.charId].icon;
  document.getElementById('enemy-sprite').textContent=enemy.icon;
  document.getElementById('b-hero-name').textContent=MASTER.chars[GS.run.charId].name;
  document.getElementById('b-enemy-name').textContent=enemy.name;
  document.getElementById('battle-log').innerHTML='';
  renderActiveBtns(); updateBattleUI(); goTo('s-battle');
  setTimeout(()=>autoBattleTick(), 1000);
}

function updateBattleUI(){
  document.getElementById('b-hero-hp').style.width=(bState.heroHp/bState.heroMaxHp*100)+'%';
  document.getElementById('b-enemy-hp').style.width=(bState.enemyHp/bState.enemyMaxHp*100)+'%';
  document.getElementById('b-hero-mp').style.width=(bState.heroMp/bState.heroMaxMp*100)+'%';
  document.getElementById('b-hero-hp-text').textContent=`${bState.heroHp}/${bState.heroMaxHp}`;
  document.getElementById('b-enemy-hp-text').textContent=`${bState.enemyHp}/${bState.enemyMaxHp}`;
  document.getElementById('b-hero-mp-text').textContent=`MP ${bState.heroMp}/${bState.heroMaxMp}`;
}

function autoBattleTick(){
  if(bState.over || paused) return;
  // 味方の攻撃
  const dmg=Math.max(1, GS.run.atk - bState.enemy.def);
  bState.enemyHp-=dmg;
  addLog(`${enemyName()}に${dmg}ダメージ`, 'log-enemy-dmg');
  updateBattleUI();
  if(bState.enemyHp<=0){ endBattle(true); return; }

  setTimeout(()=>{
    if(bState.over) return;
    // 敵の攻撃
    const eDmg=Math.max(1, bState.enemy.atk - GS.run.def);
    bState.heroHp-=eDmg;
    addLog(`${eDmg}のダメージを受けた`, 'log-hero-dmg');
    updateBattleUI();
    if(bState.heroHp<=0){ endBattle(false); return; }
    setTimeout(()=>autoBattleTick(), 1200);
  }, 800);
}

function renderActiveBtns(){
  const el=document.getElementById('active-skill-btns'); el.innerHTML='';
  (GS.run.activeSkills||[]).forEach(id=>{
    const s=MASTER.activeSkills[id];
    el.innerHTML+=`<button class="active-btn" onclick="useSkill('${id}')" ${bState.heroMp>=s.mpCost?'':'disabled'}>
      ${s.name} (MP${s.mpCost})
    </button>`;
  });
}
function useSkill(id){
  const s=MASTER.activeSkills[id];
  if(bState.heroMp<s.mpCost) return;
  bState.heroMp-=s.mpCost;
  const dmg=Math.floor(GS.run.atk * s.multiplier);
  bState.enemyHp-=dmg;
  addLog(`${s.name}！ ${dmg}ダメージ`, 'log-skill');
  updateBattleUI(); renderActiveBtns();
  if(bState.enemyHp<=0) endBattle(true);
}

function endBattle(won){
  bState.over=true;
  if(won){
    const floor=MASTER.floors.find(f=>f.id===GS.run.floorId);
    const souls=Math.floor(bState.enemy.獲得魂 * floor.soulsMult);
    const exp=Math.floor(bState.enemy.獲得EXP * floor.expMult);
    GS.run.runSouls+=souls; GS.run.runExp+=exp; GS.run.kills++; GS.run.hp=bState.heroHp; GS.run.mp=bState.heroMp;
    if(bState.isBoss) {
      if(!GS.clearedFloors.includes(GS.run.floorId)) GS.clearedFloors.push(GS.run.floorId);
      endRun(true);
    } else {
      GS.run.room++; renderDungeon(); goTo('s-dungeon');
    }
  } else { endRun(false); }
}

function endRun(won){
  GS.souls+=GS.run.runSouls; GS.exp+=GS.run.runExp;
  document.getElementById('r-souls').textContent=GS.run.runSouls;
  document.getElementById('r-exp').textContent=GS.run.runExp;
  document.getElementById('r-kills').textContent=GS.run.kills;
  document.getElementById('result-title').textContent=won?'踏破成功':'探索失敗';
  save(); goTo('s-result');
}

function enemyName(){ return bState.enemy.name; }
function addLog(msg, cls){
  const el=document.getElementById('battle-log');
  const p=document.createElement('p'); p.className=cls; p.textContent=msg;
  el.insertBefore(p, el.firstChild);
}

// ═══ その他 ══════════════════════════════════════════════
function openResetModal(){ document.getElementById('reset-modal').style.display='flex'; }
function closeResetModal(){ document.getElementById('reset-modal').style.display='none'; }
function executeHardReset(){ localStorage.clear(); location.reload(); }
function togglePause(){ paused=!paused; }

init();
</script>
</body>
</html>
